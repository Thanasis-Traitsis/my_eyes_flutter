name: CI / CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

  full_validation:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: quick_checks
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Test with coverage
        run: flutter test --coverage

      - name: Remove config/generated files from coverage
        run: |
          lcov --remove coverage/lcov.info \
            'lib/core/router/*' \
            'lib/core/constants/*' \
            'lib/core/theme/app_colors.dart' \
            'lib/core/theme/app_theme.dart' \
            'lib/core/theme/custom_text_type.dart' \
            'lib/main.dart' \
            -o coverage/lcov_filtered.info

      - name: Check coverage threshold (80%)
        run: |
          COVERAGE=$(lcov --summary coverage/lcov_filtered.info 2>&1 | grep "lines" | awk '{print $2}' | sed 's/%//')
          echo "Coverage: $COVERAGE%"
          awk -v cov="$COVERAGE" 'BEGIN { if (cov+0 < 80) { print "Coverage " cov "% is below 80% threshold"; exit 1 } }'

      - name: Build APK
        run: flutter build apk --release
